<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Spaarow Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../asset/css/main.css">
    <style>
        .navbar {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(107, 70, 193, 0.2);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #6b46c1;
            font-weight: 700;
            font-size: 20px;
            text-decoration: none;
        }

        .back-button {
            background: rgba(107, 70, 193, 0.2);
            border: 1px solid #6b46c1;
            color: #6b46c1;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .back-button:hover {
            background: rgba(107, 70, 193, 0.3);
        }

        .profile-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .profile-header h1 {
            margin: 0;
            font-size: 32px;
        }

        .edit-button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #6b46c1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 40px;
        }

        .profile-avatar {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar-placeholder {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6b46c1, #8b5cf6);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #fff;
        }

        .profile-info {
            margin-bottom: 30px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-row label {
            font-weight: 600;
            color: #999;
            font-size: 14px;
        }

        .info-row p {
            margin: 0;
            color: #fff;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat {
            text-align: center;
        }

        .stat strong {
            display: block;
            font-size: 32px;
            color: #6b46c1;
            margin-bottom: 5px;
        }

        .stat small {
            color: #999;
            font-size: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0a0a0a;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #6b46c1;
            box-shadow: 0 0 0 3px rgba(107, 70, 193, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn-primary,
        .btn-secondary {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6b46c1, #8b5cf6);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .readings-section {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .section-header h2 {
            margin: 0;
            font-size: 24px;
        }

        .section-header select {
            padding: 8px 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #0a0a0a;
            color: #fff;
            font-size: 14px;
        }

        .readings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .reading-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .reading-card:hover {
            transform: translateY(-5px);
            border-color: #6b46c1;
            box-shadow: 0 8px 20px rgba(107, 70, 193, 0.2);
        }

        .reading-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .reading-header h3 {
            margin: 0;
            font-size: 16px;
            color: #fff;
        }

        .reading-date {
            font-size: 12px;
            color: #999;
        }

        .reading-preview {
            color: #b0b0b0;
            font-size: 14px;
            margin: 10px 0;
        }

        .reading-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .reading-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background: #333;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s ease;
        }

        .reading-actions button:hover {
            background: #6b46c1;
        }

        .no-data {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>
        <div class="floating-orb orb-4"></div>
        <div class="floating-orb orb-5"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="logo">Spaarow Hub</a>
            <button class="back-button" onclick="window.history.back()">← Back</button>
        </div>
    </nav>

    <!-- Profile Content -->
    <main class="main-content">
        <section class="profile-section">
            <div class="profile-header">
                <h1>My Profile</h1>
                <button class="edit-button" id="editButton" onclick="toggleEditMode()">Edit Profile</button>
            </div>

            <!-- Profile View Mode -->
            <div id="profileViewMode" class="profile-card">
                <div class="profile-avatar">
                    <div class="avatar-placeholder"><i class="fas fa-user"></i></div>
                </div>

                <div class="profile-info">
                    <div class="info-row">
                        <label>Display Name</label>
                        <p id="displayNameView">-</p>
                    </div>
                    <div class="info-row">
                        <label>Username</label>
                        <p id="usernameView">-</p>
                    </div>
                    <div class="info-row">
                        <label>Email</label>
                        <p id="emailView">-</p>
                    </div>
                    <div class="info-row">
                        <label>Birth Date</label>
                        <p id="birthDateView">Not set</p>
                    </div>
                    <div class="info-row">
                        <label>Zodiac Sign</label>
                        <p id="zodiacView">Not detected</p>
                    </div>
                    <div class="info-row">
                        <label>Bio</label>
                        <p id="bioView">-</p>
                    </div>
                    <div class="info-row">
                        <label>Joined</label>
                        <p id="joinedView">-</p>
                    </div>
                </div>

                <!-- Stats -->
                <div class="profile-stats">
                    <div class="stat">
                        <strong id="totalReadings">0</strong>
                        <small>Total Readings</small>
                    </div>
                    <div class="stat">
                        <strong id="favoriteReadings">0</strong>
                        <small>Favorites</small>
                    </div>
                </div>
            </div>

            <!-- Profile Edit Mode -->
            <div id="profileEditMode" class="profile-card hidden">
                <form id="profileForm">
                    <div class="form-group">
                        <label for="displayNameEdit">Display Name</label>
                        <input type="text" id="displayNameEdit" required>
                    </div>
                    <div class="form-group">
                        <label for="bioEdit">Bio</label>
                        <textarea id="bioEdit" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="birthDateEdit">Birth Date</label>
                        <input type="date" id="birthDateEdit">
                    </div>
                    <div class="form-group">
                        <label for="zodiacEdit">Zodiac Sign</label>
                        <select id="zodiacEdit">
                            <option value="">Not specified</option>
                            <option value="Aries">Aries</option>
                            <option value="Taurus">Taurus</option>
                            <option value="Gemini">Gemini</option>
                            <option value="Cancer">Cancer</option>
                            <option value="Leo">Leo</option>
                            <option value="Virgo">Virgo</option>
                            <option value="Libra">Libra</option>
                            <option value="Scorpio">Scorpio</option>
                            <option value="Sagittarius">Sagittarius</option>
                            <option value="Capricorn">Capricorn</option>
                            <option value="Aquarius">Aquarius</option>
                            <option value="Pisces">Pisces</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Save Changes</button>
                        <button type="button" class="btn-secondary" onclick="toggleEditMode()">Cancel</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Reading History Section -->
        <section class="readings-section">
            <div class="section-header">
                <h2>My Readings</h2>
                <select id="toolFilter" onchange="filterReadings()">
                    <option value="">All Tools</option>
                    <option value="tarot-reading">Tarot</option>
                    <option value="dream-interpreter">Dreams</option>
                    <option value="zodiac-calculator">Zodiac</option>
                    <option value="numerology">Numerology</option>
                    <option value="rune-casting">Runes</option>
                    <option value="crystal-healing">Crystals</option>
                    <option value="fortune-teller">Fortune</option>
                    <option value="birth-charts">Birth Chart</option>
                    <option value="love-language-quiz">Love Quiz</option>
                </select>
            </div>

            <div id="readingsGrid" class="readings-grid">
                <p class="no-data">Loading your readings...</p>
            </div>
        </section>
    </main>

    <script src="../asset/js/auth.js"></script>
    <script src="../asset/js/profile.js"></script>
</body>
</html>
