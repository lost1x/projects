<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F9A8D4"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#grad)"/>
  <text x="600" y="220" text-anchor="middle" font-family="Cinzel, serif" font-size="72" fill="#FFFFFF" font-weight="700" filter="url(#glow)">Love Language Quiz</text>
  <text x="600" y="310" text-anchor="middle" font-family="Poppins, sans-serif" font-size="36" fill="#FFFFFF" opacity="0.9">Discover your emotional connection style</text>
  <text x="600" y="520" text-anchor="middle" font-family="Poppins, sans-serif" font-size="24" fill="#FFFFFF" opacity="0.7">spaarowhub.great-site.net</text>
</svg>
