<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Campaign Memory Engine - Web Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-family: 'Georgia', serif;
        }

        header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .auth-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .main-content {
            padding: 30px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 30px;
        }

        .tab {
            padding: 15px 25px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .campaign-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .campaign-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .campaign-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .campaign-card h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .campaign-card .meta {
            color: #6c757d;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .stat .number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat .label {
            color: #6c757d;
            font-size: 0.9em;
        }

        .response {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-height: 400px;
            overflow-y: auto;
        }

        .response.success {
            border-color: #28a745;
            background: #d4edda;
        }

        .response.error {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .hidden {
            display: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐉 D&D Campaign Memory Engine</h1>
            <p>Organize your campaigns, track NPCs, and never lose a plot thread again</p>
        </header>

        <!-- Authentication Section -->
        <div class="auth-section" id="authSection">
            <div id="loginForm" class="auth-form">
                <h2>Login to Your Account</h2>
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginEmail">Email:</label>
                        <input type="email" id="loginEmail" value="dm@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password:</label>
                        <input type="password" id="loginPassword" value="dragon123" required>
                    </div>
                    <button type="submit">Login</button>
                </form>
                <p style="margin-top: 15px;">
                    Don't have an account? <a href="#" onclick="showRegister()">Register here</a>
                </p>
            </div>

            <div id="registerForm" class="auth-form hidden">
                <h2>Create New Account</h2>
                <form id="registerFormElement">
                    <div class="form-group">
                        <label for="registerName">Name:</label>
                        <input type="text" id="registerName" required>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Email:</label>
                        <input type="email" id="registerEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Password:</label>
                        <input type="password" id="registerPassword" required>
                    </div>
                    <button type="submit">Register</button>
                </form>
                <p style="margin-top: 15px;">
                    Already have an account? <a href="#" onclick="showLogin()">Login here</a>
                </p>
            </div>
        </div>

        <!-- Main Application -->
        <div class="main-content hidden" id="mainApp">
            <div class="tabs">
                <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
                <button class="tab" onclick="showTab('campaigns')">Campaigns</button>
                <button class="tab" onclick="showTab('create')">Create Campaign</button>
                <button class="tab" onclick="showTab('api-test')">API Test</button>
            </div>

            <!-- Dashboard Tab -->
            <div id="dashboard" class="tab-content active">
                <h2>Campaign Dashboard</h2>
                <div id="campaignGrid" class="campaign-grid">
                    <!-- Campaigns will be loaded here -->
                </div>
                <div id="userStats" class="stats">
                    <!-- User statistics will be loaded here -->
                </div>
            </div>

            <!-- Campaigns Tab -->
            <div id="campaigns" class="tab-content">
                <h2>Your Campaigns</h2>
                <div id="campaignsList">
                    <!-- Campaigns list will be loaded here -->
                </div>
            </div>

            <!-- Create Campaign Tab -->
            <div id="create" class="tab-content">
                <h2>Create New Campaign</h2>
                <form id="createCampaignForm">
                    <div class="form-group">
                        <label for="campaignName">Campaign Name:</label>
                        <input type="text" id="campaignName" required>
                    </div>
                    <div class="form-group">
                        <label for="campaignDescription">Description:</label>
                        <textarea id="campaignDescription" rows="4" required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="dmName">DM Name:</label>
                            <input type="text" id="dmName" required>
                        </div>
                        <div class="form-group">
                            <label for="campaignSetting">Setting:</label>
                            <input type="text" id="campaignSetting" placeholder="e.g., Forgotten Realms">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="playerCharacters">Player Characters (one per line):</label>
                        <textarea id="playerCharacters" rows="3" required></textarea>
                    </div>
                    <button type="submit">Create Campaign</button>
                </form>
            </div>

            <!-- API Test Tab -->
            <div id="api-test" class="tab-content">
                <h2>API Test Console</h2>
                <div class="form-group">
                    <label for="apiEndpoint">API Endpoint:</label>
                    <select id="apiEndpoint">
                        <option value="GET /">GET / (Health Check)</option>
                        <option value="GET /campaigns">GET /campaigns (List Campaigns)</option>
                        <option value="POST /campaigns">POST /campaigns (Create Campaign)</option>
                        <option value="GET /user/profile">GET /user/profile (User Profile)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="apiData">Request Data (JSON):</label>
                    <textarea id="apiData" rows="6" placeholder='{"name": "Test Campaign", "description": "A test campaign"}'></textarea>
                </div>
                <button onclick="testAPI()">Test API</button>
                <div id="apiResponse" class="response"></div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let currentUser = null;
        let apiKey = null;
        const API_BASE = 'http://localhost:8000';

        // Authentication functions
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        // Login form submission
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    currentUser = data.data;
                    apiKey = data.data.api_key;
                    showMainApp();
                    loadDashboard();
                } else {
                    showError('Login failed: ' + (data.detail || 'Unknown error'));
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        });

        // Register form submission
        document.getElementById('registerFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    currentUser = data.data;
                    apiKey = data.data.api_key;
                    showMainApp();
                    loadDashboard();
                } else {
                    showError('Registration failed: ' + (data.detail || 'Unknown error'));
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        });

        // Show main application
        function showMainApp() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        }

        // Tab navigation
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // Load dashboard data
        async function loadDashboard() {
            try {
                // Load user profile
                const profileResponse = await fetch(`${API_BASE}/user/profile`, {
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });

                const profileData = await profileResponse.json();

                if (profileData.status === 'success') {
                    displayUserStats(profileData.data);
                }

                // Load campaigns
                const campaignsResponse = await fetch(`${API_BASE}/campaigns`, {
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });

                const campaignsData = await campaignsResponse.json();

                if (campaignsData.status === 'success') {
                    displayCampaigns(campaignsData.data.campaigns);
                }

            } catch (error) {
                showError('Failed to load dashboard: ' + error.message);
            }
        }

        // Display user statistics
        function displayUserStats(userData) {
            const statsHtml = `
                <div class="stat">
                    <div class="number">${userData.campaigns_count}</div>
                    <div class="label">Campaigns</div>
                </div>
                <div class="stat">
                    <div class="number">${userData.plan}</div>
                    <div class="label">Plan</div>
                </div>
                <div class="stat">
                    <div class="number">${userData.usage_limits.monthly_requests || '∞'}</div>
                    <div class="label">Monthly Requests</div>
                </div>
                <div class="stat">
                    <div class="number">${userData.usage_limits.can_use ? '✅' : '❌'}</div>
                    <div class="label">Can Use Service</div>
                </div>
            `;
            document.getElementById('userStats').innerHTML = statsHtml;
        }

        // Display campaigns
        function displayCampaigns(campaigns) {
            const campaignsHtml = campaigns.map(campaign => `
                <div class="campaign-card">
                    <h3>${campaign.name}</h3>
                    <div class="meta">
                        <p><strong>DM:</strong> ${campaign.dm_name}</p>
                        <p><strong>Setting:</strong> ${campaign.setting || 'Not specified'}</p>
                        <p><strong>Status:</strong> ${campaign.status}</p>
                        <p><strong>Current Session:</strong> ${campaign.current_session}</p>
                    </div>
                    <div class="meta">
                        <p><strong>Players:</strong> ${campaign.player_characters.join(', ')}</p>
                    </div>
                    <button onclick="viewCampaign('${campaign.id}')">View Details</button>
                </div>
            `).join('');

            document.getElementById('campaignGrid').innerHTML = campaignsHtml || '<p>No campaigns yet. Create your first campaign!</p>';
        }

        // Create campaign form submission
        document.getElementById('createCampaignForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const campaignData = {
                name: document.getElementById('campaignName').value,
                description: document.getElementById('campaignDescription').value,
                dm_name: document.getElementById('dmName').value,
                setting: document.getElementById('campaignSetting').value,
                player_characters: document.getElementById('playerCharacters').value.split('\n').filter(p => p.trim())
            };

            try {
                const response = await fetch(`${API_BASE}/campaigns`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(campaignData)
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showSuccess('Campaign created successfully!');
                    document.getElementById('createCampaignForm').reset();
                    loadDashboard(); // Refresh dashboard
                    showTab('dashboard'); // Switch to dashboard tab
                } else {
                    showError('Failed to create campaign: ' + (data.detail || 'Unknown error'));
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        });

        // API Test function
        async function testAPI() {
            const endpoint = document.getElementById('apiEndpoint').value;
            const requestData = document.getElementById('apiData').value;
            
            let url = `${API_BASE}${endpoint.split(' ')[1]}`;
            let method = endpoint.split(' ')[0];
            
            const options = {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                }
            };

            if (apiKey) {
                options.headers['Authorization'] = `Bearer ${apiKey}`;
            }

            if (method === 'POST' && requestData) {
                options.body = requestData;
            }

            try {
                const responseDiv = document.getElementById('apiResponse');
                responseDiv.innerHTML = '<div class="loading"></div> Making request...';
                responseDiv.className = 'response';

                const response = await fetch(url, options);
                const data = await response.json();

                responseDiv.className = `response ${response.ok ? 'success' : 'error'}`;
                responseDiv.innerHTML = `Status: ${response.status}\n\n${JSON.stringify(data, null, 2)}`;

            } catch (error) {
                const responseDiv = document.getElementById('apiResponse');
                responseDiv.className = 'response error';
                responseDiv.innerHTML = `Error: ${error.message}`;
            }
        }

        // View campaign details
        async function viewCampaign(campaignId) {
            try {
                const response = await fetch(`${API_BASE}/campaigns/${campaignId}`, {
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });

                const data = await response.json();

                if (data.status === 'success') {
                    alert(`Campaign Details:\n\nName: ${data.data.campaign.name}\nDescription: ${data.data.campaign.description}\n\nStatistics:\n- Sessions: ${data.data.statistics.total_sessions}\n- NPCs: ${data.data.statistics.total_npcs}\n- Plot Threads: ${data.data.statistics.total_plot_threads}\n- Events: ${data.data.statistics.total_events}\n- Decisions: ${data.data.statistics.total_decisions}`);
                } else {
                    showError('Failed to load campaign details: ' + (data.detail || 'Unknown error'));
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }

        // Utility functions
        function showSuccess(message) {
            const div = document.createElement('div');
            div.className = 'success-message';
            div.textContent = message;
            document.getElementById('mainApp').insertBefore(div, document.getElementById('mainApp').firstChild);
            setTimeout(() => div.remove(), 5000);
        }

        function showError(message) {
            const div = document.createElement('div');
            div.className = 'error-message';
            div.textContent = message;
            document.getElementById('mainApp').insertBefore(div, document.getElementById('mainApp').firstChild);
            setTimeout(() => div.remove(), 5000);
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            // Auto-login with demo credentials for testing
            console.log('D&D Campaign Engine Web Interface loaded');
            console.log('Use demo credentials: dm@example.com / dragon123');
        });
    </script>
</body>
</html>
