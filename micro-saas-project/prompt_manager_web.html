<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Version Manager - Web Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-family: 'Georgia', serif;
        }

        .main-content {
            padding: 30px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 30px;
        }

        .tab {
            padding: 15px 25px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .prompt-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .prompt-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .prompt-card h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .prompt-card .meta {
            color: #6c757d;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .version-comparison {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }

        .version {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }

        .version.active {
            border-color: #28a745;
            background: #d4edda;
        }

        .test-results {
            background: #e3f2fd;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .stat .number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat .label {
            color: #6c757d;
            font-size: 0.9em;
        }

        .response {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-height: 400px;
            overflow-y: auto;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI Prompt Version Manager</h1>
            <p>Save, compare, and optimize your AI prompts with version control and A/B testing</p>
        </header>

        <div class="main-content">
            <div class="tabs">
                <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
                <button class="tab" onclick="showTab('create-prompt')">Create Prompt</button>
                <button class="tab" onclick="showTab('compare')">Compare Versions</button>
                <button class="tab" onclick="showTab('ab-test')">A/B Test</button>
                <button class="tab" onclick="showTab('analytics')">Analytics</button>
            </div>

            <!-- Dashboard Tab -->
            <div id="dashboard" class="tab-content active">
                <h2>Prompt Dashboard</h2>
                <div id="promptGrid" class="prompt-grid">
                    <!-- Prompts will be loaded here -->
                </div>
                <div id="userStats" class="stats">
                    <!-- User statistics will be loaded here -->
                </div>
            </div>

            <!-- Create Prompt Tab -->
            <div id="create-prompt" class="tab-content">
                <h2>Create New Prompt</h2>
                <form id="createPromptForm">
                    <div class="form-group">
                        <label for="promptName">Prompt Name:</label>
                        <input type="text" id="promptName" required>
                    </div>
                    <div class="form-group">
                        <label for="promptDescription">Description:</label>
                        <textarea id="promptDescription" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="promptCategory">Category:</label>
                        <select id="promptCategory" required>
                            <option value="">Select category</option>
                            <option value="content_creation">Content Creation</option>
                            <option value="coding">Coding</option>
                            <option value="analysis">Analysis</option>
                            <option value="copywriting">Copywriting</option>
                            <option value="translation">Translation</option>
                            <option value="summarization">Summarization</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="promptModel">AI Model:</label>
                        <select id="promptModel" required>
                            <option value="">Select model</option>
                            <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                            <option value="gpt-4">GPT-4</option>
                            <option value="claude-3-sonnet">Claude-3 Sonnet</option>
                            <option value="claude-3-haiku">Claude-3 Haiku</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="promptContent">Prompt Content:</label>
                        <textarea id="promptContent" rows="6" required placeholder="Enter your prompt template here..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="systemPrompt">System Prompt (optional):</label>
                        <textarea id="systemPrompt" rows="3" placeholder="System instructions for the AI..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="promptTags">Tags (comma-separated):</label>
                        <input type="text" id="promptTags" placeholder="blog, content, marketing">
                    </div>
                    <button type="submit">Create Prompt</button>
                </form>
            </div>

            <!-- Compare Versions Tab -->
            <div id="compare" class="tab-content">
                <h2>Compare Prompt Versions</h2>
                <div class="form-group">
                    <label for="comparePrompt">Select Prompt:</label>
                    <select id="comparePrompt">
                        <option value="">Select a prompt to compare versions</option>
                    </select>
                </div>
                <button onclick="loadVersionsForComparison()">Load Versions</button>
                <div id="versionComparison" class="version-comparison">
                    <!-- Version comparison will be shown here -->
                </div>
            </div>

            <!-- A/B Test Tab -->
            <div id="ab-test" class="tab-content">
                <h2>Create A/B Test</h2>
                <form id="abTestForm">
                    <div class="form-group">
                        <label for="testPrompt">Select Prompt:</label>
                        <select id="testPrompt" required>
                            <option value="">Select a prompt to test</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="testName">Test Name:</label>
                        <input type="text" id="testName" required>
                    </div>
                    <div class="form-group">
                        <label for="testInput">Test Input:</label>
                        <textarea id="testInput" rows="3" required placeholder="Sample input for testing..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="evaluationCriteria">Evaluation Criteria (comma-separated):</label>
                        <input type="text" id="evaluationCriteria" required placeholder="quality, speed, accuracy">
                    </div>
                    <button type="submit">Create A/B Test</button>
                </form>
                <div id="testResults" class="test-results">
                    <!-- Test results will be shown here -->
                </div>
            </div>

            <!-- Analytics Tab -->
            <div id="analytics" class="tab-content">
                <h2>Performance Analytics</h2>
                <div id="analyticsData">
                    <!-- Analytics data will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let currentUser = null;
        let apiKey = null;
        const API_BASE = 'http://localhost:8000';

        // Mock data for demonstration
        const mockPrompts = [
            {
                id: 'prompt_1',
                name: 'Blog Post Generator',
                description: 'Generate engaging blog posts',
                category: 'content_creation',
                model: 'gpt-4',
                current_version: 2,
                usage_count: 15
            },
            {
                id: 'prompt_2',
                name: 'Code Review Assistant',
                description: 'Review and improve code quality',
                category: 'coding',
                model: 'claude-3-sonnet',
                current_version: 1,
                usage_count: 8
            }
        ];

        // Tab navigation
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // Load dashboard
        function loadDashboard() {
            displayPrompts(mockPrompts);
            displayUserStats();
        }

        // Display prompts
        function displayPrompts(prompts) {
            const promptsHtml = prompts.map(prompt => `
                <div class="prompt-card">
                    <h3>${prompt.name}</h3>
                    <div class="meta">
                        <p><strong>Description:</strong> ${prompt.description}</p>
                        <p><strong>Category:</strong> ${prompt.category}</p>
                        <p><strong>Model:</strong> ${prompt.model}</p>
                        <p><strong>Version:</strong> ${prompt.current_version}</p>
                        <p><strong>Usage:</strong> ${prompt.usage_count} times</p>
                    </div>
                    <button onclick="viewPromptDetails('${prompt.id}')">View Details</button>
                </div>
            `).join('');

            document.getElementById('promptGrid').innerHTML = promptsHtml || '<p>No prompts yet. Create your first prompt!</p>';
        }

        // Display user statistics
        function displayUserStats() {
            const statsHtml = `
                <div class="stat">
                    <div class="number">${mockPrompts.length}</div>
                    <div class="label">Total Prompts</div>
                </div>
                <div class="stat">
                    <div class="number">${mockPrompts.reduce((sum, p) => sum + p.current_version, 0)}</div>
                    <div class="label">Total Versions</div>
                </div>
                <div class="stat">
                    <div class="number">${mockPrompts.reduce((sum, p) => sum + p.usage_count, 0)}</div>
                    <div class="label">Total Usage</div>
                </div>
                <div class="stat">
                    <div class="number">7.9</div>
                    <div class="label">Avg Performance</div>
                </div>
            `;
            document.getElementById('userStats').innerHTML = statsHtml;
        }

        // Create prompt form submission
        document.getElementById('createPromptForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const promptData = {
                name: document.getElementById('promptName').value,
                description: document.getElementById('promptDescription').value,
                category: document.getElementById('promptCategory').value,
                model: document.getElementById('promptModel').value,
                content: document.getElementById('promptContent').value,
                system_prompt: document.getElementById('systemPrompt').value,
                tags: document.getElementById('promptTags').value.split(',').map(t => t.trim())
            };

            showSuccess('Prompt created successfully! (Demo mode - not saved to database)');
            document.getElementById('createPromptForm').reset();
            
            // Add to mock data
            const newPrompt = {
                id: 'prompt_' + Date.now(),
                name: promptData.name,
                description: promptData.description,
                category: promptData.category,
                model: promptData.model,
                current_version: 1,
                usage_count: 0
            };
            mockPrompts.push(newPrompt);
            loadDashboard();
            showTab('dashboard');
        });

        // Load versions for comparison
        function loadVersionsForComparison() {
            const promptId = document.getElementById('comparePrompt').value;
            if (!promptId) return;

            const prompt = mockPrompts.find(p => p.id === promptId);
            if (!prompt) return;

            const comparisonHtml = `
                <h3>Comparing versions of "${prompt.name}"</h3>
                <div class="version active">
                    <h4>Version ${prompt.current_version} (Current)</h4>
                    <p><strong>Content:</strong> Latest optimized version with improved parameters</p>
                    <p><strong>Performance:</strong> 8.5/10</p>
                    <p><strong>Cost per use:</strong> $0.0234</p>
                </div>
                <div class="version">
                    <h4>Version ${prompt.current_version - 1}</h4>
                    <p><strong>Content:</strong> Original version</p>
                    <p><strong>Performance:</strong> 7.2/10</p>
                    <p><strong>Cost per use:</strong> $0.0189</p>
                </div>
                <div style="margin-top: 20px;">
                    <h4>Key Differences:</h4>
                    <ul>
                        <li>Version ${prompt.current_version} has 15% better performance</li>
                        <li>Token count increased by 23%</li>
                        <li>Cost per use increased by $0.0045</li>
                        <li>Added call-to-action template</li>
                    </ul>
                </div>
            `;

            document.getElementById('versionComparison').innerHTML = comparisonHtml;
        }

        // Populate prompt select dropdowns
        function populatePromptSelects() {
            const selects = ['comparePrompt', 'testPrompt'];
            selects.forEach(selectId => {
                const select = document.getElementById(selectId);
                const options = mockPrompts.map(prompt => 
                    `<option value="${prompt.id}">${prompt.name}</option>`
                ).join('');
                select.innerHTML = '<option value="">Select a prompt</option>' + options;
            });
        }

        // A/B Test form submission
        document.getElementById('abTestForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const testData = {
                prompt_id: document.getElementById('testPrompt').value,
                name: document.getElementById('testName').value,
                test_input: document.getElementById('testInput').value,
                evaluation_criteria: document.getElementById('evaluationCriteria').value.split(',').map(c => c.trim())
            };

            const resultsHtml = `
                <h3>A/B Test: ${testData.name}</h3>
                <div style="margin: 20px 0;">
                    <h4>Test Results:</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div style="padding: 15px; background: #e3f2fd; border-radius: 8px;">
                            <h5>Version 1 (Original)</h5>
                            <p><strong>Quality Score:</strong> 7.2/10</p>
                            <p><strong>Speed:</strong> 2.3s</p>
                            <p><strong>Accuracy:</strong> 85%</p>
                        </div>
                        <div style="padding: 15px; background: #d4edda; border-radius: 8px; border: 1px solid #c3e6cb;">
                            <h5>Version 2 (Winner) 🏆</h5>
                            <p><strong>Quality Score:</strong> 8.8/10</p>
                            <p><strong>Speed:</strong> 2.1s</p>
                            <p><strong>Accuracy:</strong> 92%</p>
                            <p><strong>Confidence:</strong> 94%</p>
                        </div>
                    </div>
                </div>
                <p><strong>Recommendation:</strong> Version 2 performed significantly better with 94% confidence. Deploy this version.</p>
            `;

            document.getElementById('testResults').innerHTML = resultsHtml;
            showSuccess('A/B test completed successfully!');
        });

        // Load analytics
        function loadAnalytics() {
            const analyticsHtml = `
                <div class="stats">
                    <div class="stat">
                        <div class="number">${mockPrompts.length}</div>
                        <div class="label">Total Prompts</div>
                    </div>
                    <div class="stat">
                        <div class="number">${mockPrompts.reduce((sum, p) => sum + p.current_version, 0)}</div>
                        <div class="label">Total Versions</div>
                    </div>
                    <div class="stat">
                        <div class="number">$0.0234</div>
                        <div class="label">Avg Cost/Use</div>
                    </div>
                    <div class="stat">
                        <div class="number">7.9</div>
                        <div class="label">Avg Performance</div>
                    </div>
                </div>
                <div style="margin-top: 30px;">
                    <h3>Category Breakdown</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                        <div style="padding: 15px; background: #f8f9fa; border-radius: 8px;">
                            <h4>Content Creation</h4>
                            <p><strong>1 prompt</strong> (50%)</p>
                        </div>
                        <div style="padding: 15px; background: #f8f9fa; border-radius: 8px;">
                            <h4>Coding</h4>
                            <p><strong>1 prompt</strong> (50%)</p>
                        </div>
                    </div>
                </div>
                <div style="margin-top: 30px;">
                    <h3>Performance Trends</h3>
                    <p>📈 Your prompt performance has improved by 23% over the last month</p>
                    <p>💡 A/B testing has helped identify 2 winning versions</p>
                    <p>💰 Cost optimization saved $0.45 in the last week</p>
                </div>
            `;

            document.getElementById('analyticsData').innerHTML = analyticsHtml;
        }

        // View prompt details
        function viewPromptDetails(promptId) {
            const prompt = mockPrompts.find(p => p.id === promptId);
            if (!prompt) return;

            alert(`Prompt Details:\n\nName: ${prompt.name}\nDescription: ${prompt.description}\nCategory: ${prompt.category}\nModel: ${prompt.model}\nVersion: ${prompt.current_version}\nUsage: ${prompt.usage_count} times`);
        }

        // Utility functions
        function showSuccess(message) {
            const div = document.createElement('div');
            div.className = 'success-message';
            div.textContent = message;
            document.getElementById('main-content').insertBefore(div, document.getElementById('main-content').firstChild);
            setTimeout(() => div.remove(), 5000);
        }

        function showError(message) {
            const div = document.createElement('div');
            div.className = 'error-message';
            div.textContent = message;
            document.getElementById('main-content').insertBefore(div, document.getElementById('main-content').firstChild);
            setTimeout(() => div.remove(), 5000);
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
            populatePromptSelects();
            loadAnalytics();
            console.log('AI Prompt Version Manager Web Interface loaded');
        });
    </script>
</body>
</html>
